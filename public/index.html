<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Z</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07070d;
      color: #fff;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    h1 {
      font-size: 48px;
      margin: 12px 0 24px;
    }

    .panel {
      background: #0a0a0a;
      border: 1px solid #2b2b2b;
      border-radius: 24px;
      padding: 22px;
      min-height: 500px;
    }

    .chat {
      min-height: 420px;
      max-height: 60vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      white-space: pre-wrap;
    }

    .msg {
      padding: 20px;
      border-radius: 20px;
      font-size: 22px;
      line-height: 1.35;
    }

    .user {
      background: #223258;
    }

    .agent {
      background: #191936;
    }

    form {
      display: flex;
      gap: 16px;
      margin-top: 22px;
    }

    input {
      flex: 1;
      padding: 20px;
      border: none;
      border-radius: 18px;
      background: #171733;
      color: #fff;
      font-size: 22px;
      outline: none;
    }

    button {
      min-width: 136px;
      padding: 20px 24px;
      border: none;
      border-radius: 18px;
      background: #5b82ff;
      color: white;
      font-size: 22px;
      font-weight: 700;
    }

    button:disabled,
    input:disabled {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Agent Z</h1>

    <div class="panel">
      <div id="chat" class="chat">
        <div class="msg agent">Agent Z is online.</div>
      </div>

      <form id="form">
        <input
          id="input"
          type="text"
          placeholder="Talk to Agent Z..."
          autocomplete="off"
        />
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function add(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const msg = input.value.trim();
      if (!msg) return;

      add("user", msg);
      input.value = "";
      input.disabled = true;
      sendBtn.disabled = true;

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ input: msg })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.output || "Request failed");
        }

        let output = data.output;

        if (output && typeof output === "object" && output.reply) {
          output = output.reply;
        }

        add("agent", output || "No response");
      } catch (err) {
        add("agent", `Error: ${err.message}`);
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
