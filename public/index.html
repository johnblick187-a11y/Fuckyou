<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TweakBot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #0a0a0a;
color: white;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
height: 100vh;
display: flex;
overflow: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
width: 260px;
background: #0f0f0f;
border-right: 1px solid #1e1e1e;
display: flex;
flex-direction: column;
flex-shrink: 0;
transition: transform 0.25s ease;
}

.sidebar-header {
padding: 16px 12px 10px;
padding-top: calc(16px + env(safe-area-inset-top));
border-bottom: 1px solid #1e1e1e;
}

.new-chat-btn {
width: 100%;
padding: 10px 12px;
background: #1a1a1a;
border: 1px solid #2a2a2a;
border-radius: 8px;
color: #ff3333;
font-weight: bold;
cursor: pointer;
font-size: 14px;
text-align: left;
display: flex;
align-items: center;
gap: 8px;
transition: background 0.15s;
}
.new-chat-btn:hover { background: #222; }

.sidebar-label {
padding: 12px 12px 6px;
font-size: 11px;
color: #444;
text-transform: uppercase;
letter-spacing: 0.08em;
}

.chat-list {
flex: 1;
overflow-y: auto;
padding: 4px 8px 12px;
}

.chat-item {
display: flex;
align-items: center;
gap: 6px;
padding: 9px 8px;
border-radius: 7px;
cursor: pointer;
font-size: 13px;
color: #888;
transition: background 0.15s, color 0.15s;
position: relative;
}
.chat-item:hover { background: #1a1a1a; color: #ddd; }
.chat-item.active { background: #1e1e1e; color: white; }

.chat-item-name {
flex: 1;
overflow: hidden;
white-space: nowrap;
text-overflow: ellipsis;
}

.chat-item-name input {
background: transparent;
border: none;
border-bottom: 1px solid #ff3333;
color: white;
font-size: 13px;
outline: none;
width: 100%;
padding: 0;
}

.chat-item-actions {
display: none;
gap: 2px;
flex-shrink: 0;
}
.chat-item:hover .chat-item-actions,
.chat-item.active .chat-item-actions { display: flex; }

.icon-btn {
background: none;
border: none;
color: #555;
cursor: pointer;
padding: 3px 5px;
border-radius: 4px;
font-size: 12px;
line-height: 1;
transition: color 0.15s;
}
.icon-btn:hover { color: #ff3333; }

/* ===== OVERLAY (mobile) ===== */
.overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.6);
z-index: 10;
}

/* ===== MAIN ===== */
.main {
flex: 1;
display: flex;
flex-direction: column;
height: 100vh;
min-width: 0;
}

/* ===== HEADER ===== */
.header {
padding: 14px 16px;
padding-top: max(20px, calc(14px + env(safe-area-inset-top)));
border-bottom: 1px solid #1e1e1e;
display: flex;
align-items: center;
gap: 10px;
}

.mobile-menu-btn {
display: none;
background: none;
border: none;
color: #777;
font-size: 20px;
cursor: pointer;
padding: 0 4px 0 0;
line-height: 1;
}

.header-title {
font-weight: bold;
font-size: 15px;
flex: 1;
}

.status-pill {
font-size: 11px;
color: #22c55e;
display: flex;
align-items: center;
gap: 5px;
}
.status-dot {
width: 7px;
height: 7px;
background: #22c55e;
border-radius: 50%;
}

/* ===== CHAT ===== */
.chat {
flex: 1;
overflow-y: auto;
padding: 20px 16px;
display: flex;
flex-direction: column;
gap: 10px;
}

.msg {
max-width: 78%;
padding: 10px 14px;
border-radius: 12px;
font-size: 14px;
line-height: 1.55;
white-space: pre-wrap;
word-break: break-word;
}

.msg.user {
background: #1c1c1c;
color: #ff3333;
align-self: flex-end;
border-bottom-right-radius: 3px;
}

.msg.bot {
background: #111;
color: #ff3333;
align-self: flex-start;
border-bottom-left-radius: 3px;
border: 1px solid #1e1e1e;
}

/* Typing indicator */
.typing-indicator {
display: none;
align-items: center;
gap: 5px;
padding: 10px 14px;
background: #111;
border: 1px solid #1e1e1e;
border-radius: 12px;
border-bottom-left-radius: 3px;
align-self: flex-start;
width: fit-content;
}

.typing-indicator.visible { display: flex; }

.typing-dot {
width: 7px;
height: 7px;
background: #ff3333;
border-radius: 50%;
animation: bounce 1.2s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
30% { transform: translateY(-6px); opacity: 1; }
}

/* ===== INPUT ===== */
.input-container {
display: flex;
gap: 10px;
padding: 12px 12px;
padding-bottom: max(20px, calc(12px + env(safe-area-inset-bottom)));
border-top: 1px solid #1e1e1e;
background: #0a0a0a;
}

input#input {
flex: 1;
padding: 12px 14px;
border-radius: 8px;
border: 1px solid #1e1e1e;
background: #111;
color: white;
font-size: 14px;
outline: none;
transition: border-color 0.15s;
}
input#input:focus { border-color: #ff3333; }

.send-btn {
padding: 12px 18px;
background: #ff3333;
border: none;
border-radius: 8px;
color: white;
font-weight: bold;
cursor: pointer;
font-size: 14px;
transition: background 0.15s;
flex-shrink: 0;
}
.send-btn:hover { background: #e02020; }
.send-btn:disabled { background: #3a1a1a; color: #666; cursor: not-allowed; }

/* ===== EMPTY STATE ===== */
.empty-state {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 8px;
color: #333;
font-size: 14px;
}
.empty-state .big { font-size: 32px; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
.sidebar {
position: fixed;
top: 0;
left: 0;
height: 100vh;
z-index: 20;
transform: translateX(-100%);
}
.sidebar.open { transform: translateX(0); }
.overlay.open { display: block; }
.mobile-menu-btn { display: block; }
}
</style>

</head>

<body>

<!-- Overlay for mobile sidebar -->

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="new-chat-btn" onclick="newChat()">
      ✏️ New Chat
    </button>
  </div>
  <div class="sidebar-label">Conversations</div>
  <div class="chat-list" id="chatList"></div>
</div>

<!-- MAIN -->

<div class="main">

  <div class="header">
    <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
    <div class="header-title" id="headerTitle">TweakBot</div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="empty-state" id="emptyState">
      <div class="big">🤖</div>
      <div>Start a new chat</div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="input-container">
    <input id="input" placeholder="Message TweakBot..." onkeydown="if(event.key==='Enter')send()" />
    <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
  </div>

</div>

<script>
  let chats = JSON.parse(localStorage.getItem("tweakbot_chats") || "[]");
  let activeId = null;

  function save() {
    localStorage.setItem("tweakbot_chats", JSON.stringify(chats));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function newChat() {
    const id = genId();
    chats.unshift({ id, name: "New Chat", messages: [] });
    save();
    renderSidebar();
    loadChat(id);
    closeSidebar();
  }

  function loadChat(id) {
    activeId = id;
    const chat = chats.find(c => c.id === id);
    if (!chat) return;

    document.getElementById("headerTitle").textContent = chat.name;
    renderSidebar();

    const chatEl = document.getElementById("chat");
    const typing = document.getElementById("typingIndicator");
    const empty = document.getElementById("emptyState");

    chatEl.innerHTML = "";
    chatEl.appendChild(empty);
    chatEl.appendChild(typing);

    empty.style.display = chat.messages.length ? "none" : "flex";

    chat.messages.forEach(m => appendMsg(m.role, m.content, false));
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function renderSidebar() {
    const list = document.getElementById("chatList");
    list.innerHTML = "";

    chats.forEach(chat => {
      const item = document.createElement("div");
      item.className = "chat-item" + (chat.id === activeId ? " active" : "");
      item.onclick = () => { loadChat(chat.id); closeSidebar(); };

      const nameEl = document.createElement("div");
      nameEl.className = "chat-item-name";
      nameEl.textContent = chat.name;

      const actions = document.createElement("div");
      actions.className = "chat-item-actions";

      const renameBtn = document.createElement("button");
      renameBtn.className = "icon-btn";
      renameBtn.title = "Rename";
      renameBtn.textContent = "✏️";
      renameBtn.onclick = (e) => { e.stopPropagation(); startRename(chat.id, nameEl); };

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "icon-btn";
      deleteBtn.title = "Delete";
      deleteBtn.textContent = "🗑️";
      deleteBtn.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };

      actions.appendChild(renameBtn);
      actions.appendChild(deleteBtn);
      item.appendChild(nameEl);
      item.appendChild(actions);
      list.appendChild(item);
    });
  }

  function startRename(id, nameEl) {
    const chat = chats.find(c => c.id === id);
    if (!chat) return;

    const inp = document.createElement("input");
    inp.value = chat.name;
    inp.onclick = e => e.stopPropagation();

    inp.onblur = () => {
      const val = inp.value.trim();
      if (val) {
        chat.name = val;
        if (id === activeId) document.getElementById("headerTitle").textContent = val;
        save();
      }
      renderSidebar();
    };

    inp.onkeydown = (e) => {
      if (e.key === "Enter") inp.blur();
      if (e.key === "Escape") { renderSidebar(); }
      e.stopPropagation();
    };

    nameEl.textContent = "";
    nameEl.appendChild(inp);
    inp.focus();
    inp.select();
  }

  function deleteChat(id) {
    chats = chats.filter(c => c.id !== id);
    save();
    if (activeId === id) {
      activeId = null;
      document.getElementById("headerTitle").textContent = "TweakBot";
      const chatEl = document.getElementById("chat");
      const typing = document.getElementById("typingIndicator");
      const empty = document.getElementById("emptyState");
      chatEl.innerHTML = "";
      chatEl.appendChild(empty);
      chatEl.appendChild(typing);
      empty.style.display = "flex";
    }
    renderSidebar();
  }

  function appendMsg(role, content, scroll = true) {
    const empty = document.getElementById("emptyState");
    empty.style.display = "none";

    const chat = document.getElementById("chat");
    const typing = document.getElementById("typingIndicator");

    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");
    div.textContent = content;

    chat.insertBefore(div, typing);
    if (scroll) chat.scrollTop = chat.scrollHeight;
  }

  function setTyping(visible) {
    const el = document.getElementById("typingIndicator");
    el.classList.toggle("visible", visible);
    const chat = document.getElementById("chat");
    if (visible) chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    if (!activeId) { newChat(); }

    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    sendBtn.disabled = true;

    const chat = chats.find(c => c.id === activeId);
    chat.messages.push({ role: "user", content: message });

    // Auto-name chat from first message
    if (chat.messages.length === 1) {
      chat.name = message.slice(0, 30) + (message.length > 30 ? "…" : "");
      document.getElementById("headerTitle").textContent = chat.name;
    }

    save();
    appendMsg("user", message);
    setTyping(true);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, sessionId: activeId })
      });

      const data = await res.json();
      const reply = data.reply || "Something went wrong.";

      chat.messages.push({ role: "assistant", content: reply });
      save();

      setTyping(false);
      appendMsg("bot", reply);
    } catch (err) {
      setTyping(false);
      appendMsg("bot", "Error — couldn't reach TweakBot.");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function openSidebar() {
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("overlay").classList.add("open");
  }

  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("open");
  }

  // Init
  renderSidebar();
  if (chats.length > 0) loadChat(chats[0].id);
</script>

</body>
</html>
