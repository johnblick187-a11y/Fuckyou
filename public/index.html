<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TweakBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      padding: 14px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f0f0f;
    }

    #title {
      font-size: 18px;
      font-weight: bold;
    }

    #status {
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #statusDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 90%;
      word-wrap: break-word;
      line-height: 1.45;
    }

    .user {
      align-self: flex-end;
      text-align: right;
      color: #ff5a5a;
    }

    .bot {
      align-self: flex-start;
      color: #f3f3f3;
    }

    .sender {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #a5d6a7;
    }

    .markdown p {
      margin: 0 0 12px;
    }

    .markdown ul,
    .markdown ol {
      margin: 0 0 12px 20px;
      padding: 0;
    }

    .markdown li {
      margin: 4px 0;
    }

    .markdown h1,
    .markdown h2,
    .markdown h3,
    .markdown h4 {
      margin: 0 0 12px;
      line-height: 1.25;
    }

    .markdown code:not(pre code) {
      background: #181818;
      color: #d0ffd0;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
    }

    .code-wrap {
      margin: 12px 0;
      position: relative;
    }

    .code-head {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    .copy-btn {
      border: none;
      background: #1e88e5;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #1565c0;
    }

    pre {
      margin: 0;
      background: #000;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
    }

    pre code {
      color: #00ff9c;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      white-space: pre;
      display: block;
    }

    #typing {
      padding: 0 16px 10px;
      color: #888;
      font-size: 13px;
      display: none;
    }

    #inputBar {
      display: flex;
      border-top: 1px solid #222;
      background: #0f0f0f;
    }

    #input {
      flex: 1;
      padding: 14px;
      border: none;
      outline: none;
      background: #111;
      color: #fff;
      font-size: 16px;
    }

    #sendBtn {
      padding: 0 18px;
      border: none;
      background: #1e88e5;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    #sendBtn:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="title">TweakBot</div>
    <div id="status">
      <div id="statusDot"></div>
      <span>Online</span>
    </div>
  </div>

  <div id="chat"></div>
  <div id="typing">TweakBot is typing...</div>

  <div id="inputBar">
    <input id="input" placeholder="Message TweakBot..." />
    <button id="sendBtn" type="button">Send</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <script>
    let sessionId = localStorage.getItem("tweakbot_session");

    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem("tweakbot_session", sessionId);
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const typing = document.getElementById("typing");

    marked.setOptions({
      breaks: true,
      gfm: true
    });

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderMarkdown(text) {
      const raw = marked.parse(text || "");
      return DOMPurify.sanitize(raw);
    }

    function enhanceCodeBlocks(container) {
      const codeBlocks = container.querySelectorAll("pre");

      codeBlocks.forEach((pre) => {
        if (pre.parentElement?.classList.contains("code-wrap")) return;

        const wrap = document.createElement("div");
        wrap.className = "code-wrap";

        const head = document.createElement("div");
        head.className = "code-head";

        const button = document.createElement("button");
        button.className = "copy-btn";
        button.textContent = "Copy";

        button.addEventListener("click", async () => {
          const text = pre.querySelector("code")?.innerText || pre.innerText;

          try {
            await navigator.clipboard.writeText(text);
            button.textContent = "Copied!";
            setTimeout(() => {
              button.textContent = "Copy";
            }, 1200);
          } catch {
            button.textContent = "Failed";
            setTimeout(() => {
              button.textContent = "Copy";
            }, 1200);
          }
        });

        head.appendChild(button);

        pre.parentNode.insertBefore(wrap, pre);
        wrap.appendChild(head);
        wrap.appendChild(pre);
      });
    }

    function addMessage(role, text, name = "TweakBot") {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;

      if (role === "user") {
        msg.textContent = text;
      } else {
        const safeText =
          typeof text === "string" && text.trim().length > 0
            ? text
            : "Unknown — requires verified reference.";

        msg.innerHTML = `
          <span class="sender">${escapeHtml(name)}:</span>
          <div class="markdown">${renderMarkdown(safeText)}</div>
        `;

        enhanceCodeBlocks(msg);
      }

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function loadHistory() {
      try {
        const res = await fetch(`/api/chat/history?sessionId=${encodeURIComponent(sessionId)}`);
        const data = await res.json();

        if (!data.messages || !Array.isArray(data.messages)) return;

        chat.innerHTML = "";

        for (const msg of data.messages) {
          if (msg.role === "user") {
            addMessage("user", msg.content);
          } else if (msg.role === "assistant") {
            addMessage("bot", msg.content, "TweakBot");
          }
        }
      } catch (err) {
        console.error("Failed to load history:", err);
      }
    }

    async function sendMessage(message) {
      typing.style.display = "block";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            sessionId
          })
        });

        const data = await res.json();
        return {
          reply: data.reply,
          name: data.name || "TweakBot"
        };
      } finally {
        typing.style.display = "none";
      }
    }

    async function handleSend() {
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";

      try {
        const { reply, name } = await sendMessage(message);
        addMessage("bot", reply, name);
      } catch (err) {
        console.error("Send failed:", err);
        addMessage("bot", "Error contacting TweakBot.");
      }
    }

    sendBtn.addEventListener("click", handleSend);

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        handleSend();
      }
    });

    loadHistory();
  </script>
</body>
</html>
