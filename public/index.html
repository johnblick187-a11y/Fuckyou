<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TweakBot</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0b0d;
      --panel: #111317;
      --panel-2: #171a20;
      --panel-3: #1d2129;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f7fb;
      --muted: #98a2b3;
      --accent: #ff3b3b;
      --accent-2: #d90429;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
      --radius: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --sidebar-width: 290px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        sans-serif;
      overflow: hidden;
    }

    body {
      overscroll-behavior: none;
    }

    button, input, textarea {
      font: inherit;
    }

    .app {
      height: 100dvh;
      display: flex;
      background:
        radial-gradient(circle at top, rgba(255, 59, 59, 0.12), transparent 28%),
        var(--bg);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      position: relative;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: rgba(13, 15, 19, 0.96);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-width: 0;
      z-index: 30;
      transition: transform 0.2s ease;
    }

    .sidebar-header {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, rgba(17, 19, 23, 0.98), rgba(17, 19, 23, 0.9));
      backdrop-filter: blur(12px);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .icon-btn {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      font-size: 18px;
      flex: 0 0 auto;
      cursor: pointer;
    }

    .primary-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 800;
      color: white;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 18px rgba(255, 59, 59, 0.35);
      cursor: pointer;
    }

    .sidebar-search {
      margin-top: 10px;
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
    }

    .sidebar-search::placeholder {
      color: #7f8897;
    }

    .session-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
    }

    .session-item {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-radius: 16px;
      padding: 12px;
      text-align: left;
      margin-bottom: 10px;
      display: block;
      cursor: pointer;
    }

    .session-item.active {
      background: linear-gradient(180deg, rgba(255, 59, 59, 0.16), rgba(217, 4, 41, 0.08));
      border-color: rgba(255, 59, 59, 0.35);
    }

    .session-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .session-name {
      font-weight: 700;
      font-size: 14px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-time {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .session-preview {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sidebar-footer {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      background: rgba(17, 19, 23, 0.95);
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, rgba(10, 11, 13, 0.98), rgba(10, 11, 13, 0.86));
      backdrop-filter: blur(14px);
    }

    .topbar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mobile-toggle {
      display: none;
    }

    .chat-meta {
      min-width: 0;
      flex: 1;
    }

    .chat-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 16px 28px;
      scroll-behavior: smooth;
    }

    .empty {
      min-height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    .empty-card {
      max-width: 440px;
      padding: 24px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: var(--shadow);
    }

    .empty-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
      color: var(--text);
    }

    .empty-card p {
      margin: 0;
      line-height: 1.55;
      font-size: 14px;
    }

    .message-row {
      display: flex;
      margin-bottom: 12px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(88%, 860px);
      border-radius: 20px;
      padding: 14px 14px 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .message-row.user .bubble {
      background: linear-gradient(180deg, #232730, #1a1d24);
      border-bottom-right-radius: 8px;
    }

    .message-row.bot .bubble {
      background: linear-gradient(180deg, #12151a, #0f1216);
      border-bottom-left-radius: 8px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .content {
      white-space: normal;
      line-height: 1.55;
      font-size: 15px;
    }

    .content p {
      margin: 0 0 10px;
    }

    .content p:last-child {
      margin-bottom: 0;
    }

    .content ul,
    .content ol {
      margin: 0 0 10px 20px;
      padding: 0;
    }

    .content li {
      margin-bottom: 6px;
    }

    .content a {
      color: #ff7a7a;
    }

    .content pre {
      position: relative;
      background: #0d1117 !important;
      padding: 16px 14px 14px;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin: 12px 0;
    }

    .content code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 13px;
    }

    .content :not(pre) > code {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 8px;
    }

    .code-copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(17, 19, 23, 0.95);
      color: #fff;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      z-index: 3;
    }

    .code-copy-btn.copied {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border-color: transparent;
    }

    .composer {
      position: sticky;
      bottom: 0;
      z-index: 25;
      padding: 10px 14px calc(12px + var(--safe-bottom));
      border-top: 1px solid var(--border);
      background: linear-gradient(to top, rgba(10, 11, 13, 0.98), rgba(10, 11, 13, 0.84));
      backdrop-filter: blur(14px);
    }

    .composer-shell {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 10px;
    }

    .input {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
      padding: 6px 8px 10px;
    }

    .input::placeholder {
      color: #7b8492;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      padding-left: 8px;
      min-width: 0;
    }

    .send-btn {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 800;
      font-size: 14px;
      padding: 12px 18px;
      min-width: 88px;
      box-shadow: 0 8px 18px rgba(255, 59, 59, 0.35);
      flex: 0 0 auto;
      cursor: pointer;
    }

    .send-btn:disabled {
      opacity: 0.6;
      box-shadow: none;
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      height: 14px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #aab2c0;
      opacity: 0.45;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    .sidebar-backdrop {
      display: none;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.35;
      }
      40% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .sidebar {
        position: absolute;
        inset: 0 auto 0 0;
        height: 100%;
        max-width: 88vw;
        width: 88vw;
        transform: translateX(-100%);
        box-shadow: 18px 0 40px rgba(0, 0, 0, 0.45);
      }

      .app.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar-backdrop {
        display: block;
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.42);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 25;
      }

      .app.sidebar-open .sidebar-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      .mobile-toggle {
        display: grid;
      }

      .topbar-actions {
        gap: 6px;
      }

      .ghost-btn {
        padding: 9px 10px;
        font-size: 13px;
      }
    }

    @media (min-width: 901px) {
      .topbar,
      .chat,
      .composer {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-row">
          <div>
            <div class="brand-title">TweakBot</div>
            <div class="brand-subtitle">Sidebar + chat</div>
          </div>
          <button class="icon-btn" id="close-sidebar-btn" type="button" aria-label="Close sidebar">×</button>
        </div>

        <button class="primary-btn" id="new-chat-btn" type="button">+ New chat</button>
        <input class="sidebar-search" id="session-search" type="text" placeholder="Search chats..." />
      </div>

      <div class="session-list" id="session-list"></div>

      <div class="sidebar-footer">
        Share button exports the current conversation text. Streaming uses <code>/api/chat/stream</code> if available, then falls back.
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <section class="main">
      <header class="topbar">
        <div class="topbar-row">
          <button class="icon-btn mobile-toggle" id="open-sidebar-btn" type="button" aria-label="Open sidebar">☰</button>

          <div class="chat-meta">
            <h1 class="chat-title" id="chat-title">New chat</h1>
            <div class="chat-subtitle" id="chat-subtitle">TweakBot conversation</div>
          </div>

          <div class="topbar-actions">
            <button class="ghost-btn" id="rename-chat-btn" type="button">Rename</button>
            <button class="ghost-btn" id="share-chat-btn" type="button">Share</button>
            <button class="ghost-btn" id="copy-chat-btn" type="button">Copy</button>
            <button class="ghost-btn" id="clear-chat-btn" type="button">Clear view</button>
          </div>
        </div>
      </header>

      <main class="chat" id="chat">
        <div class="empty" id="empty-state">
          <div class="empty-card">
            <h2>Ready.</h2>
            <p>
              Streaming, copyable code blocks, and shareable chats are wired into this UI.
            </p>
          </div>
        </div>
      </main>

      <footer class="composer">
        <div class="composer-shell">
          <textarea
            id="input"
            class="input"
            placeholder="Message TweakBot..."
            rows="1"
            enterkeyhint="send"
          ></textarea>

          <div class="composer-actions">
            <div class="hint" id="composer-hint">TweakBot</div>
            <button id="send-btn" class="send-btn" type="button">Send</button>
          </div>
        </div>
      </footer>
    </section>
  </div>

  <script>
    const appEl = document.getElementById("app");
    const backdropEl = document.getElementById("sidebar-backdrop");
    const openSidebarBtn = document.getElementById("open-sidebar-btn");
    const closeSidebarBtn = document.getElementById("close-sidebar-btn");
    const newChatBtn = document.getElementById("new-chat-btn");
    const renameChatBtn = document.getElementById("rename-chat-btn");
    const shareChatBtn = document.getElementById("share-chat-btn");
    const copyChatBtn = document.getElementById("copy-chat-btn");
    const clearChatBtn = document.getElementById("clear-chat-btn");
    const sessionSearchEl = document.getElementById("session-search");
    const sessionListEl = document.getElementById("session-list");
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const chatTitleEl = document.getElementById("chat-title");
    const chatSubtitleEl = document.getElementById("chat-subtitle");
    const composerHintEl = document.getElementById("composer-hint");

    const STORAGE_KEY = "tweakbot_sessions";
    const ACTIVE_KEY = "tweakbot_active_session";

    let sessions = loadSessions();
    let activeSessionId = localStorage.getItem(ACTIVE_KEY) || "";
    let isSending = false;
    let typingRow = null;

    marked.setOptions({
      breaks: true,
      gfm: true
    });

    if (!sessions.length) {
      const created = createSessionObject();
      sessions = [created];
      saveSessions();
    }

    if (!activeSessionId || !sessions.some((s) => s.id === activeSessionId)) {
      activeSessionId = sessions[0].id;
      localStorage.setItem(ACTIVE_KEY, activeSessionId);
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveSessions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function createSessionObject() {
      const now = Date.now();
      return {
        id: "session_" + Math.random().toString(36).slice(2) + now.toString(36),
        name: "New chat",
        preview: "",
        updatedAt: now
      };
    }

    function formatTime(timestamp) {
      try {
        return new Date(timestamp).toLocaleDateString([], {
          month: "short",
          day: "numeric"
        });
      } catch {
        return "";
      }
    }

    function truncate(str, max = 80) {
      if (!str) return "";
      return str.length > max ? str.slice(0, max - 1) + "…" : str;
    }

    function getActiveSession() {
      return sessions.find((s) => s.id === activeSessionId) || null;
    }

    function setActiveSession(sessionId) {
      activeSessionId = sessionId;
      localStorage.setItem(ACTIVE_KEY, sessionId);
      renderSessionList();
      renderHeader();
      clearChatView();
      loadHistory();
      closeSidebar();
    }

    function renderHeader() {
      const active = getActiveSession();
      chatTitleEl.textContent = active?.name || "New chat";
      chatSubtitleEl.textContent = active?.id || "TweakBot conversation";
      composerHintEl.textContent = active?.name || "TweakBot";
    }

    function renderSessionList(filter = "") {
      const query = filter.trim().toLowerCase();
      const filtered = sessions
        .slice()
        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0))
        .filter((session) => {
          if (!query) return true;
          return (
            session.name.toLowerCase().includes(query) ||
            (session.preview || "").toLowerCase().includes(query)
          );
        });

      sessionListEl.innerHTML = "";

      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.style.color = "var(--muted)";
        empty.style.padding = "12px";
        empty.style.fontSize = "13px";
        empty.textContent = "No chats found.";
        sessionListEl.appendChild(empty);
        return;
      }

      filtered.forEach((session) => {
        const btn = document.createElement("button");
        btn.className = "session-item" + (session.id === activeSessionId ? " active" : "");
        btn.type = "button";

        btn.innerHTML = `
          <div class="session-top">
            <div class="session-name">${escapeHtml(session.name || "New chat")}</div>
            <div class="session-time">${escapeHtml(formatTime(session.updatedAt || Date.now()))}</div>
          </div>
          <div class="session-preview">${escapeHtml(session.preview || "No messages yet")}</div>
        `;

        btn.addEventListener("click", () => {
          setActiveSession(session.id);
        });

        sessionListEl.appendChild(btn);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function openSidebar() {
      appEl.classList.add("sidebar-open");
    }

    function closeSidebar() {
      appEl.classList.remove("sidebar-open");
    }

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
    }

    function clearChatView() {
      chatEl.innerHTML = `
        <div class="empty" id="empty-state">
          <div class="empty-card">
            <h2>Ready.</h2>
            <p>Continue this chat or send the first message for this session.</p>
          </div>
        </div>
      `;
    }

    function removeEmptyState() {
      const emptyState = document.getElementById("empty-state");
      if (emptyState) emptyState.remove();
    }

    function scrollToBottom(force = false) {
      if (force) {
        chatEl.scrollTop = chatEl.scrollHeight;
        return;
      }
      requestAnimationFrame(() => {
        chatEl.scrollTop = chatEl.scrollHeight;
      });
    }

    function renderMarkdownWithCodeTools(container, content) {
      container.innerHTML = marked.parse(content || "");

      container.querySelectorAll("pre code").forEach((block) => {
        Prism.highlightElement(block);

        const pre = block.parentElement;
        if (!pre || pre.querySelector(".code-copy-btn")) return;

        const btn = document.createElement("button");
        btn.className = "code-copy-btn";
        btn.type = "button";
        btn.textContent = "Copy";

        btn.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(block.textContent || "");
            btn.textContent = "Copied";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = "Copy";
              btn.classList.remove("copied");
            }, 1400);
          } catch {
            btn.textContent = "Failed";
            setTimeout(() => {
              btn.textContent = "Copy";
            }, 1400);
          }
        });

        pre.appendChild(btn);
      });
    }

    function createMessageBubble({ role, content, provider = "" }) {
      removeEmptyState();

      const row = document.createElement("div");
      row.className = `message-row ${role === "user" ? "user" : "bot"}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const meta = document.createElement("div");
      meta.className = "meta";

      const name = document.createElement("span");
      name.textContent = role === "user" ? "You" : "TweakBot";
      meta.appendChild(name);

      if (role !== "user" && provider) {
        const providerBadge = document.createElement("span");
        providerBadge.className = "badge";
        providerBadge.textContent = provider;
        meta.appendChild(providerBadge);
      }

      const body = document.createElement("div");
      body.className = "content";
      renderMarkdownWithCodeTools(body, content || "");

      bubble.appendChild(meta);
      bubble.appendChild(body);
      row.appendChild(bubble);
      chatEl.appendChild(row);

      scrollToBottom();
      return { row, body };
    }

    function updateBubbleContent(bodyEl, content) {
      renderMarkdownWithCodeTools(bodyEl, content || "");
      scrollToBottom();
    }

    function showTyping() {
      removeEmptyState();

      const row = document.createElement("div");
      row.className = "message-row bot";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = "TweakBot";

      const body = document.createElement("div");
      body.className = "content";
      body.innerHTML = `
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      `;

      bubble.appendChild(meta);
      bubble.appendChild(body);
      row.appendChild(bubble);
      chatEl.appendChild(row);

      typingRow = row;
      scrollToBottom(true);
    }

    function hideTyping() {
      if (typingRow) {
        typingRow.remove();
        typingRow = null;
      }
    }

    function updateSessionMetaFromMessage(message) {
      const active = getActiveSession();
      if (!active) return;

      if (!active.preview) {
        active.name = truncate(message, 36) || "New chat";
      }

      active.preview = truncate(message, 80);
      active.updatedAt = Date.now();

      saveSessions();
      renderSessionList(sessionSearchEl.value);
      renderHeader();
    }

    function updateSessionMetaFromReply(reply) {
      const active = getActiveSession();
      if (!active) return;

      if (!active.preview && reply) {
        active.preview = truncate(reply, 80);
      }

      active.updatedAt = Date.now();
      saveSessions();
      renderSessionList(sessionSearchEl.value);
      renderHeader();
    }

    async function loadHistory() {
      const active = getActiveSession();
      if (!active) return;

      try {
        const response = await fetch(`/api/chat/history?sessionId=${encodeURIComponent(active.id)}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.error || "Failed to load chat history");
        }

        const messages = Array.isArray(data.messages) ? data.messages : [];
        if (!messages.length) return;

        messages.forEach((msg) => {
          createMessageBubble({
            role: msg.role,
            content: msg.content || ""
          });
        });

        const firstUser = messages.find((msg) => msg.role === "user" && msg.content);
        const lastMsg = messages[messages.length - 1];

        if (firstUser && active.name === "New chat") {
          active.name = truncate(firstUser.content, 36);
        }

        if (lastMsg?.content) {
          active.preview = truncate(lastMsg.content, 80);
        }

        active.updatedAt = Date.now();
        saveSessions();
        renderSessionList(sessionSearchEl.value);
        renderHeader();
        scrollToBottom(true);
      } catch (error) {
        console.error("History load failed:", error);
        createMessageBubble({
          role: "assistant",
          content: `Error loading history: ${error.message || "Unknown error"}`,
          provider: "client"
        });
      }
    }

    async function streamAssistantReply(message, sessionId) {
      const response = await fetch("/api/chat/stream", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "text/event-stream"
        },
        body: JSON.stringify({
          message,
          sessionId
        })
      });

      if (!response.ok || !response.body) {
        throw new Error("Streaming unavailable");
      }

      const { body } = createMessageBubble({
        role: "assistant",
        content: "",
        provider: "stream"
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");

      let buffer = "";
      let fullText = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        const parts = buffer.split("\n\n");
        buffer = parts.pop() || "";

        for (const part of parts) {
          const lines = part.split("\n");
          let eventName = "message";
          let data = "";

          for (const line of lines) {
            if (line.startsWith("event:")) {
              eventName = line.slice(6).trim();
            } else if (line.startsWith("data:")) {
              data += line.slice(5).trimStart();
            }
          }

          if (!data) continue;

          if (eventName === "chunk") {
            fullText += data;
            updateBubbleContent(body, fullText);
          } else if (eventName === "done") {
            if (data) {
              fullText = data;
              updateBubbleContent(body, fullText);
            }
            updateSessionMetaFromReply(fullText);
            return fullText;
          } else if (eventName === "error") {
            throw new Error(data || "Stream failed");
          }
        }
      }

      updateSessionMetaFromReply(fullText);
      return fullText;
    }

    async function sendNormalReply(message, sessionId) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message,
          sessionId
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data?.error || "Request failed");
      }

      createMessageBubble({
        role: "assistant",
        content: data.reply || "",
        provider: data.provider || ""
      });

      updateSessionMetaFromReply(data.reply || "");
      return data.reply || "";
    }

    async function sendMessage() {
      if (isSending) return;

      const active = getActiveSession();
      if (!active) return;

      const message = inputEl.value.trim();
      if (!message) return;

      isSending = true;
      sendBtn.disabled = true;

      createMessageBubble({
        role: "user",
        content: message
      });

      updateSessionMetaFromMessage(message);
      inputEl.value = "";
      autoResize();

      try {
        await streamAssistantReply(message, active.id);
      } catch (streamErr) {
        console.warn("Streaming failed, falling back:", streamErr);
        try {
          await sendNormalReply(message, active.id);
        } catch (error) {
          createMessageBubble({
            role: "assistant",
            content: `Error: ${error.message || "Something went wrong."}`,
            provider: "client"
          });
          updateSessionMetaFromReply(error.message || "Error");
        }
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function createNewChat() {
      const session = createSessionObject();
      sessions.unshift(session);
      saveSessions();
      setActiveSession(session.id);
      renderSessionList(sessionSearchEl.value);
      renderHeader();
      clearChatView();
    }

    function renameChat() {
      const active = getActiveSession();
      if (!active) return;

      const nextName = prompt("Rename chat", active.name || "New chat");
      if (!nextName) return;

      active.name = nextName.trim() || active.name || "New chat";
      active.updatedAt = Date.now();
      saveSessions();
      renderSessionList(sessionSearchEl.value);
      renderHeader();
    }

    function clearCurrentChatView() {
      clearChatView();
    }

    async function copyCurrentChat() {
      const transcript = buildTranscript();
      if (!transcript.trim()) return;

      try {
        await navigator.clipboard.writeText(transcript);
        copyChatBtn.textContent = "Copied";
        setTimeout(() => {
          copyChatBtn.textContent = "Copy";
        }, 1400);
      } catch {
        copyChatBtn.textContent = "Failed";
        setTimeout(() => {
          copyChatBtn.textContent = "Copy";
        }, 1400);
      }
    }

    async function shareCurrentChat() {
      const active = getActiveSession();
      const transcript = buildTranscript();

      if (!transcript.trim()) return;

      if (navigator.share) {
        try {
          await navigator.share({
            title: active?.name || "TweakBot Chat",
            text: transcript
          });
          return;
        } catch (err) {
          if (err && err.name === "AbortError") return;
        }
      }

      try {
        await navigator.clipboard.writeText(transcript);
        shareChatBtn.textContent = "Copied";
        setTimeout(() => {
          shareChatBtn.textContent = "Share";
        }, 1400);
      } catch {
        shareChatBtn.textContent = "Failed";
        setTimeout(() => {
          shareChatBtn.textContent = "Share";
        }, 1400);
      }
    }

    function buildTranscript() {
      const rows = [...chatEl.querySelectorAll(".message-row")];
      return rows
        .map((row) => {
          const role = row.classList.contains("user") ? "You" : "TweakBot";
          const contentNode = row.querySelector(".content");
          const text = contentNode ? contentNode.innerText.trim() : "";
          return `${role}:\n${text}`;
        })
        .filter(Boolean)
        .join("\n\n");
    }

    openSidebarBtn?.addEventListener("click", openSidebar);
    closeSidebarBtn?.addEventListener("click", closeSidebar);
    backdropEl?.addEventListener("click", closeSidebar);

    newChatBtn.addEventListener("click", createNewChat);
    renameChatBtn.addEventListener("click", renameChat);
    shareChatBtn.addEventListener("click", shareCurrentChat);
    copyChatBtn.addEventListener("click", copyCurrentChat);
    clearChatBtn.addEventListener("click", clearCurrentChatView);
    sendBtn.addEventListener("click", sendMessage);

    sessionSearchEl.addEventListener("input", () => {
      renderSessionList(sessionSearchEl.value);
    });

    inputEl.addEventListener("input", autoResize);

    inputEl.addEventListener("keydown", async (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await sendMessage();
      }
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 900) {
        closeSidebar();
      }
      scrollToBottom();
    });

    renderSessionList();
    renderHeader();
    autoResize();
    loadHistory();
  </script>
</body>
</html>
