<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TweakBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      padding: 14px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #title {
      font-size: 18px;
      font-weight: bold;
    }

    #status {
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #statusDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin-bottom: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 80%;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      background: #ff4d4d;
      color: #fff;
      align-self: flex-end;
    }

    .bot {
      background: #1a1a1a;
      color: #a5d6a7;
      align-self: flex-start;
    }

    #typing {
      font-size: 13px;
      color: #888;
      padding-left: 16px;
      display: none;
    }

    #inputBar {
      display: flex;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      background: #111;
      color: #fff;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border: none;
      background: #1e88e5;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>

  <div id="header">
    <div id="title">TweakBot</div>
    <div id="status">
      <div id="statusDot"></div>
      <span>Online</span>
    </div>
  </div>

  <div id="chat"></div>
  <div id="typing">TweakBot is typing...</div>

  <div id="inputBar">
    <input id="input" placeholder="Message TweakBot..." />
    <button onclick="handleSend()">Send</button>
  </div>

  <script>
    let sessionId = localStorage.getItem("tweakbot_session");

    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem("tweakbot_session", sessionId);
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const typing = document.getElementById("typing");

    function addMessage(role, text, name = "TweakBot") {
      const div = document.createElement("div");
      div.className = "msg " + role;

      if (role === "user") {
        div.textContent = text;
      } else {
        div.innerHTML = `<strong>${name}:</strong> ${text}`;
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage(message) {
      typing.style.display = "block";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message,
          sessionId
        })
      });

      const data = await res.json();
      typing.style.display = "none";

      return {
        reply: data.reply,
        name: data.name || "TweakBot"
      };
    }

    async function handleSend() {
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";

      try {
        const { reply, name } = await sendMessage(message);
        addMessage("bot", reply, name);
      } catch (err) {
        typing.style.display = "none";
        addMessage("bot", "Error contacting TweakBot.");
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        handleSend();
      }
    });
  </script>

</body>
</html>
