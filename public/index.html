<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TweakBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .msg {
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .user {
      color: #4fc3f7;
    }

    .bot {
      color: #a5d6a7;
    }

    #inputBar {
      display: flex;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      background: #111;
      color: #fff;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border: none;
      background: #1e88e5;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>

  <div id="chat"></div>

  <div id="inputBar">
    <input id="input" placeholder="Message TweakBot..." />
    <button onclick="handleSend()">Send</button>
  </div>

  <script>
    // ✅ Persistent session
    let sessionId = localStorage.getItem("tweakbot_session");

    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem("tweakbot_session", sessionId);
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = (role === "user" ? "You: " : "TweakBot: ") + text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage(message) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message,
          sessionId
        })
      });

      const data = await res.json();
      return data.reply;
    }

    async function handleSend() {
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";

      try {
        const reply = await sendMessage(message);
        addMessage("bot", reply);
      } catch (err) {
        addMessage("bot", "Error contacting TweakBot.");
      }
    }

    // Enter key support
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        handleSend();
      }
    });
  </script>

</body>
</html>
