<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>TweakBot</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0b;
      --panel: #111214;
      --panel-2: #17191d;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f7fb;
      --muted: #9aa3b2;
      --accent: #ff8a5b;
      --accent-2: #ff6a2a;
      --user: #1b1d22;
      --bot: #13161a;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        sans-serif;
      overflow: hidden;
    }

    body {
      overscroll-behavior: none;
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at top, rgba(255, 138, 91, 0.12), transparent 30%),
        var(--bg);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 14px 14px 10px;
      background: linear-gradient(to bottom, rgba(10, 10, 11, 0.96), rgba(10, 10, 11, 0.8));
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .session-pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      max-width: 42vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mode-wrap {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .mode-wrap::-webkit-scrollbar {
      display: none;
    }

    .mode-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
      transition: 0.15s ease;
    }

    .mode-btn.active {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 16px rgba(255, 106, 42, 0.35);
    }

    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px 14px 24px;
      scroll-behavior: smooth;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    .empty-card {
      max-width: 420px;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: var(--shadow);
    }

    .empty-card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      color: var(--text);
    }

    .empty-card p {
      margin: 0;
      line-height: 1.55;
      font-size: 14px;
    }

    .message-row {
      display: flex;
      margin-bottom: 12px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(88%, 760px);
      border-radius: 20px;
      padding: 14px 14px 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .message-row.user .bubble {
      background: linear-gradient(180deg, #232730, #1a1d24);
      border-bottom-right-radius: 8px;
    }

    .message-row.bot .bubble {
      background: linear-gradient(180deg, #12151a, #0f1216);
      border-bottom-left-radius: 8px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .content {
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 15px;
    }

    .composer {
      position: sticky;
      bottom: 0;
      z-index: 25;
      padding: 10px 14px calc(12px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(10, 10, 11, 0.98), rgba(10, 10, 11, 0.82));
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
    }

    .composer-shell {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 10px;
    }

    .input {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 16px;
      line-height: 1.45;
      padding: 6px 8px 10px;
    }

    .input::placeholder {
      color: #788191;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 4px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      padding-left: 8px;
      min-width: 0;
    }

    .send-btn {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 800;
      font-size: 14px;
      padding: 12px 18px;
      min-width: 88px;
      box-shadow: 0 8px 18px rgba(255, 106, 42, 0.35);
    }

    .send-btn:disabled {
      opacity: 0.6;
      box-shadow: none;
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      height: 14px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #aab2c0;
      opacity: 0.45;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.35;
      }
      40% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    @media (min-width: 768px) {
      .topbar,
      .chat,
      .composer {
        padding-left: max(18px, calc(50vw - 420px));
        padding-right: max(18px, calc(50vw - 420px));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1 class="title">TweakBot</h1>
          <div class="subtitle">Clean mobile chat UI</div>
        </div>
        <div class="session-pill" id="session-pill"></div>
      </div>

      <div class="mode-wrap" id="mode-wrap">
        <button class="mode-btn active" data-mode="chat" type="button">Chat</button>
        <button class="mode-btn" data-mode="plan" type="button">Plan</button>
        <button class="mode-btn" data-mode="file" type="button">File</button>
        <button class="mode-btn" data-mode="debug" type="button">Debug</button>
      </div>
    </header>

    <main class="chat" id="chat">
      <div class="empty" id="empty-state">
        <div class="empty-card">
          <h2>Ready.</h2>
          <p>
            Pick a mode, type your message, and send. This layout is built to
            feel clean and usable on iPhone without the cramped mess.
          </p>
        </div>
      </div>
    </main>

    <footer class="composer">
      <div class="composer-shell">
        <textarea
          id="input"
          class="input"
          placeholder="Message TweakBot..."
          rows="1"
          enterkeyhint="send"
        ></textarea>

        <div class="composer-actions">
          <div class="hint" id="mode-hint">Mode: chat</div>
          <button id="send-btn" class="send-btn" type="button">Send</button>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const modeWrap = document.getElementById("mode-wrap");
    const modeHint = document.getElementById("mode-hint");
    const emptyState = document.getElementById("empty-state");
    const sessionPill = document.getElementById("session-pill");

    const SESSION_KEY = "tweakbot_session_id";
    const MODE_KEY = "tweakbot_mode";

    let currentMode = localStorage.getItem(MODE_KEY) || "chat";
    let isSending = false;
    let typingId = null;

    function getSessionId() {
      let sessionId = localStorage.getItem(SESSION_KEY);
      if (!sessionId) {
        sessionId = "session_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem(SESSION_KEY, sessionId);
      }
      return sessionId;
    }

    const sessionId = getSessionId();
    sessionPill.textContent = sessionId;

    function setActiveMode(mode) {
      currentMode = mode;
      localStorage.setItem(MODE_KEY, mode);
      modeHint.textContent = `Mode: ${mode}`;

      document.querySelectorAll(".mode-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
    }

    setActiveMode(currentMode);

    modeWrap.addEventListener("click", (event) => {
      const btn = event.target.closest(".mode-btn");
      if (!btn) return;
      setActiveMode(btn.dataset.mode);
    });

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
    }

    inputEl.addEventListener("input", autoResize);

    inputEl.addEventListener("keydown", async (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await sendMessage();
      }
    });

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function removeEmptyState() {
      if (emptyState) {
        emptyState.remove();
      }
    }

    function scrollToBottom(force = false) {
      if (force) {
        chatEl.scrollTop = chatEl.scrollHeight;
        return;
      }

      requestAnimationFrame(() => {
        chatEl.scrollTop = chatEl.scrollHeight;
      });
    }

    function createMessageBubble({ role, content, mode = "", provider = "" }) {
      removeEmptyState();

      const row = document.createElement("div");
      row.className = `message-row ${role === "user" ? "user" : "bot"}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const meta = document.createElement("div");
      meta.className = "meta";

      const name = document.createElement("span");
      name.textContent = role === "user" ? "You" : "TweakBot";
      meta.appendChild(name);

      if (role !== "user" && mode) {
        const modeBadge = document.createElement("span");
        modeBadge.className = "badge";
        modeBadge.textContent = mode;
        meta.appendChild(modeBadge);
      }

      if (role !== "user" && provider) {
        const providerBadge = document.createElement("span");
        providerBadge.className = "badge";
        providerBadge.textContent = provider;
        meta.appendChild(providerBadge);
      }

      const body = document.createElement("div");
      body.className = "content";
      body.textContent = content;

      bubble.appendChild(meta);
      bubble.appendChild(body);
      row.appendChild(bubble);
      chatEl.appendChild(row);

      scrollToBottom();
      return row;
    }

    function showTyping() {
      removeEmptyState();

      const row = document.createElement("div");
      row.className = "message-row bot";
      row.id = "typing-row";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = "TweakBot";

      const body = document.createElement("div");
      body.className = "content";
      body.innerHTML = `
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      `;

      bubble.appendChild(meta);
      bubble.appendChild(body);
      row.appendChild(bubble);
      chatEl.appendChild(row);
      typingId = row;

      scrollToBottom(true);
    }

    function hideTyping() {
      if (typingId) {
        typingId.remove();
        typingId = null;
      }
    }

    async function loadHistory() {
      try {
        const response = await fetch(`/api/chat/history?sessionId=${encodeURIComponent(sessionId)}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.error || "Failed to load history");
        }

        const messages = Array.isArray(data.messages) ? data.messages : [];
        if (!messages.length) return;

        removeEmptyState();

        messages.forEach((msg) => {
          createMessageBubble({
            role: msg.role,
            content: msg.content || ""
          });
        });

        scrollToBottom(true);
      } catch (error) {
        console.error("History load failed:", error);
      }
    }

    async function sendMessage() {
      if (isSending) return;

      const message = inputEl.value.trim();
      if (!message) return;

      isSending = true;
      sendBtn.disabled = true;

      createMessageBubble({
        role: "user",
        content: message
      });

      inputEl.value = "";
      autoResize();
      showTyping();

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            sessionId,
            mode: currentMode
          })
        });

        const data = await response.json();
        hideTyping();

        if (!response.ok) {
          throw new Error(data?.error || "Request failed");
        }

        createMessageBubble({
          role: "assistant",
          content: data.reply || "",
          mode: data.mode || currentMode,
          provider: data.provider || ""
        });
      } catch (error) {
        hideTyping();
        createMessageBubble({
          role: "assistant",
          content: `Error: ${error.message || "Something went wrong."}`,
          mode: currentMode,
          provider: "client"
        });
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    window.addEventListener("resize", () => {
      scrollToBottom();
    });

    autoResize();
    loadHistory();
  </script>
</body>
</html>
