<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TweakBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      padding: 14px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f0f0f;
    }

    #title {
      font-size: 18px;
      font-weight: bold;
    }

    #status {
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #statusDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 90%;
      line-height: 1.45;
      word-wrap: break-word;
    }

    .user {
      color: #ff4d4d;
      align-self: flex-end;
      text-align: right;
    }

    .bot {
      color: #e8e8e8;
      align-self: flex-start;
    }

    .bot strong.sender {
      color: #a5d6a7;
    }

    .markdown {
      margin-top: 6px;
    }

    .markdown p {
      margin: 0 0 10px;
    }

    .markdown h1,
    .markdown h2,
    .markdown h3,
    .markdown h4,
    .markdown h5,
    .markdown h6 {
      margin: 12px 0 8px;
      line-height: 1.25;
      color: #fff;
    }

    .markdown ul,
    .markdown ol {
      margin: 8px 0 12px 20px;
      padding: 0;
    }

    .markdown li {
      margin: 4px 0;
    }

    .markdown blockquote {
      margin: 10px 0;
      padding: 8px 12px;
      border-left: 3px solid #444;
      background: #161616;
      color: #ccc;
    }

    .markdown a {
      color: #7cc4ff;
      text-decoration: none;
    }

    .markdown a:hover {
      text-decoration: underline;
    }

    .markdown hr {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 14px 0;
    }

    .markdown :not(pre) > code {
      background: #161616;
      color: #00ff9c;
      padding: 2px 6px;
      border-radius: 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
    }

    .code-container {
      position: relative;
      margin: 10px 0 14px;
    }

    .code-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    .copy-btn {
      background: #1e88e5;
      border: none;
      color: #fff;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #1565c0;
    }

    pre {
      margin: 0;
      background: #000;
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
    }

    pre code {
      color: #00ff9c;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      white-space: pre;
      display: block;
    }

    #typing {
      font-size: 13px;
      color: #888;
      padding: 0 16px 10px;
      display: none;
    }

    #inputBar {
      display: flex;
      border-top: 1px solid #222;
      background: #0f0f0f;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      background: #111;
      color: #fff;
      font-size: 16px;
    }

    button.send-btn {
      padding: 12px 16px;
      border: none;
      background: #1e88e5;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button.send-btn:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="title">TweakBot</div>
    <div id="status">
      <div id="statusDot"></div>
      <span>Online</span>
    </div>
  </div>

  <div id="chat"></div>
  <div id="typing">TweakBot is typing...</div>

  <div id="inputBar">
    <input id="input" placeholder="Message TweakBot..." />
    <button class="send-btn" onclick="handleSend()">Send</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <script>
    let sessionId = localStorage.getItem("tweakbot_session");

    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem("tweakbot_session", sessionId);
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const typing = document.getElementById("typing");

    marked.setOptions({
      breaks: true,
      gfm: true
    });

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function enhanceCodeBlocks(container) {
      const pres = container.querySelectorAll("pre");

      pres.forEach((pre) => {
        if (pre.parentElement?.classList.contains("code-container")) return;

        const wrapper = document.createElement("div");
        wrapper.className = "code-container";

        const header = document.createElement("div");
        header.className = "code-header";

        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.textContent = "Copy";

        btn.addEventListener("click", async () => {
          const code = pre.querySelector("code")?.innerText || pre.innerText;

          try {
            await navigator.clipboard.writeText(code);
            btn.textContent = "Copied!";
            setTimeout(() => {
              btn.textContent = "Copy";
            }, 1200);
          } catch {
            btn.textContent = "Failed";
            setTimeout(() => {
              btn.textContent = "Copy";
            }, 1200);
          }
        });

        header.appendChild(btn);

        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(header);
        wrapper.appendChild(pre);
      });
    }

    function renderMarkdown(text) {
      const rawHtml = marked.parse(text || "");
      const safeHtml = DOMPurify.sanitize(rawHtml);
      return safeHtml;
    }

    function addMessage(role, text, name = "TweakBot") {
      const div = document.createElement("div");
      div.className = "msg " + role;

      if (role === "user") {
        div.textContent = text;
      } else {
        const safeName = escapeHtml(name);
        div.innerHTML = `
          <strong class="sender">${safeName}:</strong>
          <div class="markdown">${renderMarkdown(text)}</div>
        `;
        enhanceCodeBlocks(div);
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage(message) {
      typing.style.display = "block";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message,
          sessionId
        })
      });

      const data = await res.json();
      typing.style.display = "none";

      return {
        reply: data.reply,
        name: data.name || "TweakBot"
      };
    }

    async function handleSend() {
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";

      try {
        const { reply, name } = await sendMessage(message);
        addMessage("bot", reply, name);
      } catch (err) {
        typing.style.display = "none";
        addMessage("bot", "Error contacting TweakBot.");
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        handleSend();
      }
    });
  </script>
</body>
</html>
