<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TweakBot</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #0b0b0b;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      font-weight: bold;
      border-bottom: 1px solid #222;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .msg {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #1e1e1e;
      align-self: flex-end;
    }

    .ai {
      background: #111;
      border: 1px solid #333;
      align-self: flex-start;
    }

    #inputBar {
      display: flex;
      padding: 10px;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #111;
      border: 1px solid #333;
      color: white;
      border-radius: 6px;
    }

    button {
      margin-left: 8px;
      padding: 10px 14px;
      background: #4f46e5;
      border: none;
      border-radius: 6px;
      color: white;
    }
  </style>
</head>

<body>

<header>TweakBot</header>

<div id="chat"></div>

<div id="inputBar">
  <input id="msg" placeholder="Type a message..." />
  <button onclick="send()">Send</button>
</div>

<script>
  const chat = document.getElementById("chat");

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const input = document.getElementById("msg");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    addMessage("...", "ai");

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      chat.lastChild.innerText = data.reply || "No response";
    } catch (err) {
      chat.lastChild.innerText = "Error talking to TweakBot";
    }
  }
</script>

</body>
</html>
