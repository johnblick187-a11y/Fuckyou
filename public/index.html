<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>TweakBot</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0a0a0a;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: #111;
  border-right: 1px solid #222;
  padding: 10px;
}

/* hide sidebar on mobile */
@media (max-width: 768px) {
  .sidebar {
    display: none;
  }
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ===== HEADER ===== */
.header {
  padding: 16px;
  padding-top: calc(16px + env(safe-area-inset-top));
  border-bottom: 1px solid #222;
  font-weight: bold;
}

/* ===== CHAT ===== */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* ===== INPUT ===== */
.input-container {
  display: flex;
  gap: 10px;
  padding: 12px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  border-top: 1px solid #222;
  background: #0a0a0a;
  position: sticky;
  bottom: 0;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  padding: 12px 18px;
  background: #007bff;
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="sidebar">
  <button style="width:100%">Chat</button>
</div>

<div class="main">

  <div class="header">
    TweakBot ● Online
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-container">
    <input id="input" placeholder="Message TweakBot..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value;
  if (!message) return;

  chat.innerHTML += `<div>${message}</div>`;
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chat.innerHTML += `<div style="color:#4dabf7">${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
